<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>WorkoutMoney</title>
<!-- AI pose detection (loads from the internet; served live it counts pushups automatically) -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#121415; --surf:#1e2021; --surf-low:#1a1c1d; --surf-high:#282a2b; --surf-highest:#333536; --surf-lowest:#0c0e0f;
    --primary:#91d78a; --primary-c:#1b5e20; --on-primary:#003909; --on-primary-c:#90d689;
    --text:#e2e2e3; --muted:#c0c9bb; --outline:#8a9386; --outline-v:#41493e;
    --error:#ffb4ab; --error-c:#93000a; --on-error-c:#ffdad6;
    --fh:'Hanken Grotesk',system-ui,-apple-system,sans-serif;
    --fb:'Inter',system-ui,-apple-system,sans-serif;
    --fm:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:var(--fb);background:var(--bg);color:var(--text);line-height:1.5;
    display:flex;justify-content:center;-webkit-font-smoothing:antialiased}
  .app{width:100%;max-width:600px;height:100dvh;display:flex;flex-direction:column;position:relative;
    border-left:1px solid var(--outline-v);border-right:1px solid var(--outline-v);overflow:hidden}

  /* top app bar */
  header{height:64px;flex:none;display:flex;align-items:center;justify-content:space-between;padding:0 16px;
    background:rgba(18,20,21,.8);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(65,73,62,.3);z-index:20}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .tile{width:32px;height:32px;border-radius:10px;background:var(--primary-c);color:var(--on-primary-c);
    display:flex;align-items:center;justify-content:center}
  .brand h1{font-family:var(--fh);font-size:20px;font-weight:700;color:var(--primary);margin:0;letter-spacing:-.01em}
  .brand h1 span{color:var(--text)}
  .avatar{width:32px;height:32px;border-radius:50%;background:var(--surf-high);border:1px solid var(--outline-v);
    display:flex;align-items:center;justify-content:center;color:var(--muted)}

  #content{flex:1;overflow-y:auto;padding:20px 16px 28px;scrollbar-width:none;-ms-overflow-style:none}
  #content::-webkit-scrollbar{display:none}
  .screen{display:none}
  .screen.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  h1.page{font-family:var(--fh);font-size:24px;font-weight:600;letter-spacing:-.01em;margin:0 0 4px}
  .lead{color:var(--muted);font-size:15px;max-width:44ch}
  .eyebrow{font-family:var(--fm);font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .muted{color:var(--muted);font-size:14px}
  .num{font-family:var(--fm)}

  .card{background:rgba(30,32,33,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(65,73,62,.3);box-shadow:inset 0 1px 0 0 rgba(255,255,255,.05);
    border-radius:14px;padding:20px;margin-top:16px}
  .card.dashed{border-style:dashed;border-color:rgba(138,147,134,.4);background:rgba(26,28,29,.4)}
  .card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
  h2{font-family:var(--fh);font-size:20px;font-weight:600;margin:0}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
  .stat{background:rgba(30,32,33,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(65,73,62,.3);box-shadow:inset 0 1px 0 0 rgba(255,255,255,.05);
    border-radius:14px;padding:18px;border-left:4px solid transparent}
  .stat.pos{border-left-color:var(--primary)}
  .stat.neg{border-left-color:var(--error)}
  .stat.glow{box-shadow:inset 0 1px 0 0 rgba(255,255,255,.05),0 0 20px rgba(145,215,138,.15)}
  .stat .k{font-family:var(--fm);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted)}
  .stat .v{font-family:var(--fh);font-size:40px;font-weight:700;letter-spacing:-.02em;margin-top:6px;line-height:1}
  .stat .v.small{font-size:30px}
  .stat.pos .v{color:var(--primary)}
  .stat.neg .v{color:var(--error)}

  .pill{display:inline-flex;align-items:center;font-family:var(--fm);font-size:11px;font-weight:500;
    padding:4px 12px;border-radius:999px;border:1px solid transparent;text-transform:uppercase;letter-spacing:.04em}
  .pill.todo{background:var(--surf-highest);color:var(--muted);border-color:rgba(138,147,134,.3)}
  .pill.done{background:rgba(145,215,138,.15);color:var(--primary)}
  .pill.miss{background:rgba(255,180,171,.12);color:var(--error)}
  .pill.rest{background:rgba(180,207,149,.14);color:#b4cf95}
  .pill.binding{background:var(--primary-c);color:var(--on-primary-c);border:none}

  .btn{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--primary);
    color:var(--on-primary);font-family:var(--fb);font-weight:700;border:none;padding:15px 18px;border-radius:12px;
    font-size:15px;cursor:pointer;margin-top:14px;transition:transform .12s,box-shadow .2s}
  .btn:hover{box-shadow:0 0 26px rgba(145,215,138,.3)}
  .btn:active{transform:scale(.98)}
  .btn.container{background:var(--primary-c);color:var(--on-primary-c)}
  .btn.container:hover{box-shadow:0 6px 18px rgba(0,0,0,.4)}
  .btn.ghost{background:transparent;border:1px solid rgba(138,147,134,.4);color:var(--text)}
  .btn.ghost:hover{box-shadow:none;border-color:var(--primary)}
  .btn.danger{background:transparent;border:1px solid var(--error-c);color:var(--error)}
  .btn.danger:hover{box-shadow:none;background:rgba(147,0,10,.15)}
  .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
  .link{color:var(--primary);font-family:var(--fm);font-size:12px;font-weight:500;background:none;border:none;
    cursor:pointer;padding:0;text-transform:uppercase;letter-spacing:.04em}
  .link:hover{text-decoration:underline}

  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .icontile{width:48px;height:48px;border-radius:12px;background:var(--surf-highest);color:var(--primary);
    display:flex;align-items:center;justify-content:center;flex:none}
  .icontile.sm{width:40px;height:40px;border-radius:10px;background:rgba(138,147,134,.15);color:var(--muted)}

  /* progress */
  .progress{height:8px;background:var(--surf-highest);border-radius:999px;overflow:hidden;margin-top:8px}
  .progress > i{display:block;height:100%;width:0;background:var(--primary);border-radius:999px;transition:width .3s}

  /* multiple exercises per day */
  .exitem{padding-top:14px;border-top:1px solid var(--outline-v);margin-top:14px}
  .exitem:first-child{border-top:none;padding-top:0;margin-top:0}
  .exlist{display:flex;flex-direction:column;margin-top:4px}
  .exline{display:flex;align-items:center;gap:10px;padding:11px 0;border-top:1px solid var(--outline-v)}
  .exline:first-child{border-top:none}
  .exname{flex:1;font-weight:600}
  .exprog{color:var(--muted);font-size:13px}
  .exdot{width:18px;height:18px;border-radius:50%;border:2px solid var(--outline);flex:none}
  .exdot.done{background:var(--primary);border-color:var(--primary)}

  /* schedule day */
  .exrow{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
  .chip{font-family:var(--fb);border:1px solid rgba(138,147,134,.35);border-radius:999px;padding:7px 13px;font-size:13px;
    color:var(--muted);cursor:pointer;background:none;transition:.15s}
  .chip.sel{border-color:var(--primary);color:var(--on-primary);background:var(--primary)}
  .field{display:flex;align-items:center;gap:0;background:var(--surf-lowest);border:1px solid var(--outline-v);
    border-radius:8px;overflow:hidden;width:max-content}
  .field input{background:transparent;border:none;color:var(--text);font-family:var(--fm);font-size:16px;
    width:64px;text-align:center;padding:8px 6px}
  .field input:focus{outline:none}
  .field .u{font-family:var(--fm);font-size:11px;color:var(--muted);padding:0 12px;text-transform:uppercase;letter-spacing:.05em}
  input:focus-visible{outline:2px solid var(--primary);outline-offset:1px}

  /* switch */
  .switch{position:relative;display:inline-block;width:46px;height:26px;flex:none}
  .switch input{display:none}
  .slider{position:absolute;inset:0;background:var(--surf-highest);border-radius:999px;transition:.2s;cursor:pointer}
  .slider:before{content:"";position:absolute;height:20px;width:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked+.slider{background:var(--primary)}
  .switch input:checked+.slider:before{transform:translateX(20px)}
  .switch input:disabled+.slider{opacity:.5;cursor:not-allowed}

  /* camera */
  .camwrap{position:relative;height:300px;border-radius:14px;overflow:hidden;background:#000;margin-top:8px}
  .camwrap video,.camwrap canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .camplaceholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted)}
  .repbig{font-family:var(--fh);font-size:56px;font-weight:700;text-align:center;margin:14px 0 4px;letter-spacing:-.02em}
  .repbig .t{color:var(--muted);font-size:26px}

  /* contract / forms */
  .textinput{width:100%;background:var(--surf-lowest);border:1px solid var(--outline-v);color:var(--text);
    border-radius:10px;padding:12px 14px;font-size:15px;font-family:var(--fb);margin-top:10px}
  .textinput:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(145,215,138,.25)}
  .amtrow{display:flex;flex-wrap:wrap;gap:10px;margin-top:4px}
  .amt{background:var(--surf-low);border:2px solid var(--outline-v);border-radius:12px;padding:14px 22px;cursor:pointer;
    font-family:var(--fh);font-size:20px;font-weight:700}
  .amt.sel{border-color:var(--primary);color:var(--primary)}
  .step{font-family:var(--fm);color:var(--primary);font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
  .contract{background:var(--surf-lowest);border:1px solid var(--outline-v);border-radius:12px;padding:16px;font-size:14px;color:var(--muted)}
  .contract h3{color:var(--text);font-family:var(--fh);margin:0 0 10px}
  .contract p{margin:0 0 8px}
  .kv{display:flex;justify-content:space-between;gap:16px;padding:10px 0;border-bottom:1px solid var(--outline-v);font-size:14px}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--muted)}
  .kv .v{font-family:var(--fm);text-align:right}
  .warnbox{background:rgba(255,180,171,.08);border:1px solid rgba(255,180,171,.4);color:#ffd7d2;border-radius:12px;
    padding:14px;font-weight:700;text-align:center;margin:14px 0;font-size:14px}
  .banner{background:rgba(180,207,149,.1);border:1px solid rgba(180,207,149,.35);color:#cfe6b0;padding:12px 14px;
    border-radius:12px;margin-top:14px;font-size:14px}
  .lockbanner{background:rgba(145,215,138,.08);border:1px solid rgba(145,215,138,.35);color:var(--primary);
    padding:12px 14px;border-radius:12px;margin-top:14px;font-size:14px;font-weight:600}
  .agree{display:flex;gap:12px;align-items:flex-start;margin:16px 0;color:var(--muted);cursor:pointer;font-size:14px}
  .agree .box{width:26px;height:26px;border:2px solid var(--outline);border-radius:7px;flex:none;
    display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--on-primary)}
  .agree.on .box{background:var(--primary);border-color:var(--primary)}
  .disclaimer{font-size:12px;color:var(--muted);margin-top:16px;line-height:1.6}

  /* preference hub rows */
  .prefrow{display:flex;align-items:center;gap:14px;padding:14px 16px;background:rgba(30,32,33,.7);
    border:1px solid rgba(65,73,62,.3);border-radius:12px;margin-top:12px;cursor:pointer}
  .prefrow:hover{border-color:rgba(145,215,138,.4)}
  .prefrow .t{font-weight:600}
  .prefrow .s{font-family:var(--fm);font-size:11px;color:var(--muted)}
  .prefrow .chev{margin-left:auto;color:var(--muted)}
  .prefrow.danger{border-color:var(--error-c);background:rgba(147,0,10,.1)}
  .prefrow.danger .t{color:var(--error)}

  /* recent + history */
  .recent{display:flex;align-items:center;gap:12px;padding:12px 0;border-top:1px solid var(--outline-v)}
  .recent:first-child{border-top:none}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{font-family:var(--fm);color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    text-align:left;border-bottom:1px solid var(--outline-v);padding:8px 4px}
  td{border-bottom:1px solid var(--outline-v);padding:11px 4px}
  td.n{font-family:var(--fm)}

  /* bottom nav */
  #tabbar{flex:none;display:flex;justify-content:space-around;align-items:center;height:74px;padding:0 8px;
    background:rgba(26,28,29,.96);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border-top:1px solid rgba(65,73,62,.25)}
  .tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);background:none;border:none;
    cursor:pointer;padding:6px 14px;border-radius:12px;font-family:var(--fm);font-size:10px;transition:.15s}
  .tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tab.active{background:var(--primary-c);color:var(--on-primary-c)}
  .tab:not(.active):hover{color:var(--primary)}

  /* toast (replaces browser popups) */
  #toast{position:absolute;left:50%;bottom:90px;transform:translateX(-50%) translateY(16px);
    background:var(--surf-highest);color:var(--text);border:1px solid var(--outline-v);
    padding:12px 18px;border-radius:12px;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.45);
    opacity:0;pointer-events:none;transition:.25s;max-width:82%;text-align:center;z-index:60}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="tile">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6.5 6.5l11 11M4 8l-2 2 3 3-3 3 2 2 3-3 3 3 2-2-11-11-2 2z" opacity="0"/><path d="M4 9v6M7 7v10M17 7v10M20 9v6M7 12h10"/></svg>
      </div>
      <h1>Workout<span>Money</span></h1>
    </div>
    <div class="row" style="gap:14px">
      <span class="avatar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      </span>
    </div>
  </header>

  <div id="content">
    <section id="home" class="screen active"></section>
    <section id="workout" class="screen"></section>
    <section id="setup" class="screen"></section>
    <section id="contract" class="screen"></section>
    <section id="settings" class="screen"></section>
    <section id="history" class="screen"></section>
  </div>

  <nav id="tabbar">
    <button class="tab active" data-screen="home">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      <span>Home</span>
    </button>
    <button class="tab" data-screen="workout">
      <svg viewBox="0 0 24 24"><path d="M4 9v6M7 7v10M17 7v10M20 9v6M7 12h10"/></svg>
      <span>Today</span>
    </button>
    <button class="tab" data-screen="setup">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/></svg>
      <span>Schedule</span>
    </button>
    <button class="tab" data-screen="contract">
      <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 10h20M17 14h2"/></svg>
      <span>Wallet</span>
    </button>
    <button class="tab" data-screen="settings">
      <svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg>
      <span>Profile</span>
    </button>
  </nav>
</div>

<script>
/* ============================================================
   WorkoutMoney — web prototype. "Kinetic Institutional" UI.
   No real money is charged. Billing/forfeiture is SIMULATED.
   Data is stored locally in your browser (localStorage).
============================================================ */
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const FULLDAY = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const EXERCISES = ['Pushups','Squats','Situps','Lunges','Burpees'];

const store = {
  load(){
    return {
      regimen: JSON.parse(localStorage.getItem('wm_regimen')||'null'),
      log: JSON.parse(localStorage.getItem('wm_log')||'{}'),
      contract: JSON.parse(localStorage.getItem('wm_contract')||'null'),
      health: JSON.parse(localStorage.getItem('wm_health')||'false'),
      regimenSaved: JSON.parse(localStorage.getItem('wm_regimenSaved')||'false'),
    };
  },
  saveRegimen(r){ localStorage.setItem('wm_regimen', JSON.stringify(r)); },
  saveLog(l){ localStorage.setItem('wm_log', JSON.stringify(l)); },
  saveContract(c){ localStorage.setItem('wm_contract', JSON.stringify(c)); },
  saveHealth(h){ localStorage.setItem('wm_health', JSON.stringify(h)); },
  saveRegimenSaved(v){ localStorage.setItem('wm_regimenSaved', JSON.stringify(v)); },
};
function defaultRegimen(){ const r={}; DAYS.forEach((d,i)=>{ r[i]={rest:(i===0||i===6),exercises:[{exercise:'Pushups',target:20}]}; }); return r; }
// normalize a day to the multi-exercise shape (handles the old single-exercise format)
function normDay(d){
  if(!d) return {rest:false,exercises:[{exercise:'Pushups',target:20}]};
  if(Array.isArray(d.exercises)&&d.exercises.length)
    return {rest:!!d.rest,exercises:d.exercises.map(e=>({exercise:e.exercise||'Pushups',target:Math.max(1,+e.target||1)}))};
  return {rest:!!d.rest,exercises:[{exercise:d.exercise||'Pushups',target:Math.max(1,+d.target||20)}]};
}
function normRegimen(r){ const o={}; DAYS.forEach((_,i)=>{ o[i]=normDay(r&&r[i]); }); return o; }
function addMonths(d,n){ const x=new Date(d); const day=x.getDate(); x.setDate(1); x.setMonth(x.getMonth()+n);
  const dim=new Date(x.getFullYear(),x.getMonth()+1,0).getDate(); x.setDate(Math.min(day,dim)); return x; }
function daySummary(reg){ return reg.exercises.map(e=>`${e.target} ${e.exercise}`).join(' · '); }
function todayKey(d=new Date()){ return d.toISOString().slice(0,10); }
function dowOf(key){ return new Date(key+'T00:00:00').getDay(); }
function money(n){ return '$'+(Math.round(n*100)/100).toLocaleString(); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let state = store.load();
state.regimen = state.regimen ? normRegimen(state.regimen) : defaultRegimen();

/* ---------- stats / forfeiture engine ---------- */
function computeStats(){
  const c = state.contract;
  const invested = c ? c.amount : 0;
  let balance = invested, forfeited = 0, streak = 0;
  const logKeys = Object.keys(state.log).sort();
  const startKey = c ? c.date.slice(0,10) : (logKeys[0]||todayKey());
  const start = new Date(startKey+'T00:00:00');
  const today = new Date(todayKey()+'T00:00:00');
  // penalty 1: two scheduled days missed in a row -> half the balance
  let consecutiveMiss = 0;
  for(let d=new Date(start); d<today; d.setDate(d.getDate()+1)){
    const reg = state.regimen[d.getDay()];
    if(!reg || reg.rest) continue;
    const done = state.log[todayKey(d)] && state.log[todayKey(d)].completed;
    if(done){ consecutiveMiss=0; streak++; }
    else { consecutiveMiss++; streak=0; if(consecutiveMiss>=2){ if(c&&c.signed&&balance>0){ const loss=balance/2; forfeited+=loss; balance-=loss; } consecutiveMiss=0; } }
  }
  // penalty 2: >2 missed non-rest days in a monthly cycle anchored to the signing date -> forfeit 1/4
  if(c&&c.signed){
    const sign=new Date(c.date); sign.setHours(0,0,0,0);
    let k=0;
    while(addMonths(sign,k+1)<=today){
      const cs=addMonths(sign,k), ce=addMonths(sign,k+1);
      let missed=0;
      for(let d=new Date(cs); d<ce; d.setDate(d.getDate()+1)){
        const reg=state.regimen[d.getDay()]; if(!reg||reg.rest) continue;
        const done=state.log[todayKey(d)] && state.log[todayKey(d)].completed;
        if(!done) missed++;
      }
      if(missed>2&&balance>0){ const loss=Math.min(invested/4,balance); forfeited+=loss; balance-=loss; }
      k++;
    }
  }
  return {invested,balance,forfeited,streak};
}
function scheduledPerWeek(){ return DAYS.filter((_,i)=>!state.regimen[i].rest).length; }
// Current signing-anchored month: missed non-rest days so far + days until it resets. Null until signed.
function cycleInfo(){
  const c=state.contract; if(!c||!c.signed) return null;
  const sign=new Date(c.date); sign.setHours(0,0,0,0);
  const today=new Date(todayKey()+'T00:00:00');
  let k=0; while(addMonths(sign,k+1)<=today) k++;
  const start=addMonths(sign,k), end=addMonths(sign,k+1);
  let missed=0;
  for(let d=new Date(start); d<today; d.setDate(d.getDate()+1)){
    const reg=state.regimen[d.getDay()]; if(!reg||reg.rest) continue;
    const done=state.log[todayKey(d)] && state.log[todayKey(d)].completed;
    if(!done) missed++;
  }
  const daysUntilReset=Math.max(0,Math.ceil((end-today)/86400000));
  return {missed,daysUntilReset,allowed:2};
}

async function startCamera(){
  const status=document.getElementById('aiStatus');
  const video=document.getElementById('video'), overlay=document.getElementById('overlay');
  try{
    status.textContent='Requesting camera…';
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
    video.srcObject=camStream; await video.play();
    document.getElementById('camPh').style.display='none';
    overlay.width=video.videoWidth||480; overlay.height=video.videoHeight||360;
    status.textContent='Loading AI model…';
    if(window.poseDetection){
      detector=await poseDetection.createDetector(poseDetection.SupportedModels.MoveNet,{modelType:poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING});
      status.textContent='AI ready — start doing pushups!'; running=true; renderCamControls(); loop();
    } else { running=true; renderCamControls(); status.textContent='AI unavailable here — open the hosted site for automatic counting.'; }
  }catch(err){ status.textContent='Camera unavailable: '+err.message; }
}
function stopCamera(){ running=false; if(rafId) cancelAnimationFrame(rafId); if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; } }
function angle(a,b,c){ const ab=[a.x-b.x,a.y-b.y], cb=[c.x-b.x,c.y-b.y]; const dot=ab[0]*cb[0]+ab[1]*cb[1], m=Math.hypot(...ab)*Math.hypot(...cb)||1; return Math.acos(Math.max(-1,Math.min(1,dot/m)))*180/Math.PI; }
function good(a,b,c){ return a&&b&&c&&a.score>0.3&&b.score>0.3&&c.score>0.3; }
async function loop(){
  if(!running) return;
  try{
    const video=document.getElementById('video'), overlay=document.getElementById('overlay');
    const poses=await detector.estimatePoses(video);
    const ctx=overlay.getContext('2d'); ctx.clearRect(0,0,overlay.width,overlay.height);
    if(poses[0]){
      const kp={}; poses[0].keypoints.forEach(p=>kp[p.name]=p);
      ctx.fillStyle='#91d78a'; poses[0].keypoints.forEach(p=>{ if(p.score>0.3){ ctx.beginPath();ctx.arc(p.x,p.y,4,0,7);ctx.fill(); }});
      const angles=[];
      if(good(kp.left_shoulder,kp.left_elbow,kp.left_wrist)) angles.push(angle(kp.left_shoulder,kp.left_elbow,kp.left_wrist));
      if(good(kp.right_shoulder,kp.right_elbow,kp.right_wrist)) angles.push(angle(kp.right_shoulder,kp.right_elbow,kp.right_wrist));
      if(angles.length){ const avg=angles.reduce((a,b)=>a+b,0)/angles.length;
        if(phase==='up' && avg<95) phase='down'; else if(phase==='down' && avg>150){ phase='up'; addRep(); }
        document.getElementById('aiStatus').textContent=`Elbow ${Math.round(avg)}° — ${phase==='down'?'go up ⬆':'go down ⬇'}`; }
    }
  }catch(e){}
  rafId=requestAnimationFrame(loop);
}
function addRep(){
  if(activeIdx>=sessionItems.length) return;
  const it=sessionItems[activeIdx];
  it.reps++;
  const prog=document.getElementById('exprog-'+activeIdx); if(prog) prog.textContent=`${Math.min(it.reps,it.target)} / ${it.target}`;
  const rc=document.getElementById('repCount'); if(rc) rc.textContent=it.reps;
  const totalTarget=sessionItems.reduce((a,b)=>a+b.target,0);
  const totalDone=sessionItems.reduce((a,b)=>a+Math.min(b.reps,b.target),0);
  const pct=Math.min(100,Math.round(totalDone/totalTarget*100));
  const rb=document.getElementById('repBar'); if(rb) rb.style.width=pct+'%';
  const rp=document.getElementById('repPct'); if(rp) rp.textContent=pct;
  if(it.reps>=it.target){
    it.done=true;
    const dot=document.getElementById('exdot-'+activeIdx); if(dot) dot.classList.add('done');
    let next=activeIdx+1; while(next<sessionItems.length && sessionItems[next].done) next++;
    if(next>=sessionItems.length){ completeDay(); return; }
    activeIdx=next;
    const nl=document.getElementById('nowLabel'); if(nl) nl.textContent='Now: '+sessionItems[activeIdx].exercise;
    const rcx=document.getElementById('repCount'); if(rcx) rcx.textContent=0;
    const rt=document.getElementById('repTarget'); if(rt) rt.textContent=sessionItems[activeIdx].target;
  }
}

      not a legally binding agreement. Consult a lawyer and a payment provider before doing this for real.</p>
    </div>`;
  const amtEls=el.querySelectorAll('.amt');
  amtEls.forEach(a=>a.onclick=()=>{ amtEls.forEach(x=>x.classList.remove('sel')); a.classList.add('sel'); selectedAmount=+a.dataset.a; document.getElementById('customAmt').value=''; refreshAmt(); });
  document.getElementById('customAmt').oninput=(e)=>{ amtEls.forEach(x=>x.classList.remove('sel')); selectedAmount=Math.max(0,+e.target.value||0); refreshAmt(); };
  let agreed=false, agreed2=false;
  const agree=document.getElementById('agree'), agree2=document.getElementById('agree2'), name=document.getElementById('sigName'), btn=document.getElementById('signBtn');
  agree.onclick=()=>{ if(!set) return; agreed=!agreed; agree.classList.toggle('on',agreed); agree.querySelector('.box').textContent=agreed?'✓':''; upd(); };
  agree2.onclick=()=>{ if(!set) return; agreed2=!agreed2; agree2.classList.toggle('on',agreed2); agree2.querySelector('.box').textContent=agreed2?'✓':''; upd(); };
  function upd(){ btn.disabled=!(set && agreed && agreed2 && name.value.trim().length>1 && selectedAmount>0); }
  name.oninput=upd;
  btn.onclick=()=>{
    state.contract={signed:true,amount:selectedAmount,name:name.value.trim(),date:new Date().toISOString()};
    state.health=false; store.saveHealth(false); store.saveContract(state.contract);
    toast('Signed — your money is on the line. Show up.'); showScreen('workout');
  };
}
function refreshAmt(){ document.querySelectorAll('#contract [data-amt]').forEach(h=>h.textContent='$'+selectedAmount); }

/* ---------- PROFILE (settings) ---------- */
function renderSettings(){
  const signed = state.contract && state.contract.signed;
  const s = computeStats();
  const name = signed ? state.contract.name : 'Your account';
  let health;
  if(!signed) health=`<p class="muted">No active contract — there's nothing to pause. The health exception appears here once you've signed.</p>`;
  else if(state.health) health=`<div class="banner">🩺 Health exception is active — billing is paused.</div><button class="btn" onclick="setHealthFromSettings(false)">Resume commitment</button>`;
  else health=`<p class="muted">Stopping for a genuine health reason? This is the only way out of a signed contract. It pauses all billing.</p><button class="btn danger" onclick="claimHealth()">Claim health exception</button>`;

  document.getElementById('settings').innerHTML=`
    <div class="card" style="text-align:center;padding:24px">
      <div style="width:64px;height:64px;border-radius:16px;background:var(--surf-highest);border:2px solid var(--primary);margin:0 auto;display:flex;align-items:center;justify-content:center;color:var(--primary)">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/></svg></div>
      <h2 style="margin-top:12px;font-size:22px">${escapeHtml(name)}</h2>
    </div>
    <div class="card"><div class="k eyebrow">Total amount invested</div>
      <div style="font-family:var(--fh);font-size:40px;font-weight:700;letter-spacing:-.02em;margin-top:6px">${money(s.invested)}</div>
      <div class="num" style="color:var(--primary);font-size:13px;margin-top:6px">${money(s.balance)} balance at stake · ${money(s.forfeited)} forfeited</div></div>

    <div style="margin-top:22px" class="eyebrow">Preference hub</div>
    <div class="card"><h2 style="font-size:18px">Health exception</h2><div style="margin-top:8px">${health}</div></div>

    <div class="prefrow" onclick="showScreen('history')">
      <span class="icontile sm"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5M12 7v5l3 2"/></svg></span>
      <div><div class="t">History</div><div class="s">Every day you've logged</div></div>
      <span class="chev">›</span></div>

    <div class="prefrow danger" onclick="resetAll()">
      <span class="icontile sm" style="color:var(--error)"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></span>
      <div><div class="t">${resetArmed?'Tap again to confirm':'Reset all data'}</div><div class="s">${resetArmed?'This erases everything':'Erase schedule, log &amp; contract'}</div></div>
      <span class="chev" style="color:var(--error)">›</span></div>

    <p class="disclaimer">WorkoutMoney prototype. No real money is charged and the contract is not legally binding.
    All data is stored only in this browser.</p>`;
}
function setHealthFromSettings(v){ state.health=v; store.saveHealth(v); renderSettings(); toast(v?'Health exception on — billing paused.':'Commitment resumed.'); }
function claimHealth(){ state.health=true; store.saveHealth(true); renderSettings(); toast('Health exception on — billing paused.'); }
function resetAll(){
  if(!resetArmed){ resetArmed=true; renderSettings(); toast('Tap “Reset all data” again to confirm — this erases everything.'); setTimeout(()=>{ if(resetArmed){ resetArmed=false; renderSettings(); } },4000); return; }
  ['wm_regimen','wm_log','wm_contract','wm_health','wm_regimenSaved'].forEach(k=>localStorage.removeItem(k));
  state=store.load(); state.regimen=defaultRegimen(); resetArmed=false; showScreen('home'); toast('All data erased.');
}

/* ---------- HISTORY ---------- */
function renderHistory(){
  const keys=Object.keys(state.log).sort().reverse();
  const rows = keys.length
    ? keys.map(k=>{ const r=state.log[k]; return `<tr><td class="n">${k}</td><td>${DAYS[dowOf(k)]}</td>
        <td><span class="pill ${r.completed?'done':'miss'}">${r.completed?'Done':'Missed'}</span></td>
        <td class="n" style="text-align:right">${r.reps||'—'}</td></tr>`; }).join('')
    : `<tr><td colspan="4" class="muted">No workouts logged yet.</td></tr>`;
  document.getElementById('history').innerHTML=`
    <div class="card-head" style="margin-bottom:0"><h1 class="page">History</h1><button class="link" onclick="showScreen('settings')">Back</button></div>
    <div class="card"><table>
      <tr><th>Date</th><th>Day</th><th>Status</th><th style="text-align:right">Reps</th></tr>${rows}
    </table></div>`;
}

renderHome();
</script>
</body>
</html>
